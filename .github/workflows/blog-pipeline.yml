name: Blog Pipeline

permissions:
  contents: read

on:
  push:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔎 Lint code"
        run: npm run lint

      - name: "📝 Checking code format"
        run: npm run format:check

      - name: "🚀 Build the project"
        run: npm run build

      - name: "📦 Upload build artifact"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: blog-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy blog
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📦 Download build artifact"
        uses: actions/download-artifact@v7
        with:
          name: blog-dist
          path: dist

      - name: "🔐 Configure SSH"
        env:
          SSH_TARGETS: ${{ secrets.SSH_HOSTS || secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          mapfile -t hosts < <(printf '%s\n' "$SSH_TARGETS" | sed -e 's/[[:space:],]\+/\n/g' -e '/^$/d')
          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "::error::No SSH targets configured in SSH_HOSTS or SSH_HOST."
            exit 1
          fi

          echo "Preparing SSH known_hosts for ${#hosts[@]} target(s): ${hosts[*]}"
          failed_hosts=()
          for host in "${hosts[@]}"; do
            echo "::group::ssh-keyscan ${host}"
            if ssh-keyscan -p "${SSH_PORT:-22}" "$host" >> "$HOME/.ssh/known_hosts" 2>&1; then
              echo "SSH host key recorded for ${host}"
            else
              echo "::error::Failed to fetch SSH host key for ${host}"
              failed_hosts+=("$host")
            fi
            echo "::endgroup::"
          done

          if [ "${#failed_hosts[@]}" -gt 0 ]; then
            echo "::error::SSH host key setup failed for: ${failed_hosts[*]}"
            exit 1
          fi

      - name: "📤 Sync dist/ to server"
        env:
          SSH_TARGETS: ${{ secrets.SSH_HOSTS || secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -t hosts < <(printf '%s\n' "$SSH_TARGETS" | sed -e 's/[[:space:],]\+/\n/g' -e '/^$/d')
          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "::error::No SSH targets configured in SSH_HOSTS or SSH_HOST."
            exit 1
          fi

          echo "Deploying dist/ to ${#hosts[@]} target(s): ${hosts[*]}"
          failed_hosts=()
          succeeded_hosts=()
          for host in "${hosts[@]}"; do
            echo "::group::deploy ${host}"

            if ! ssh -p "${SSH_PORT:-22}" "$SSH_USER@$host" "mkdir -p /var/www/blog"; then
              echo "::error::Failed to create remote directory on ${host}"
              failed_hosts+=("$host")
              echo "::endgroup::"
              continue
            fi

            if ! rsync -az --delete -e "ssh -p ${SSH_PORT:-22}" dist/ "$SSH_USER@$host:/var/www/blog/"; then
              echo "::error::rsync failed for ${host}"
              failed_hosts+=("$host")
              echo "::endgroup::"
              continue
            fi

            echo "Deployment succeeded for ${host}"
            succeeded_hosts+=("$host")
            echo "::endgroup::"
          done

          if [ "${#succeeded_hosts[@]}" -gt 0 ]; then
            echo "Successful deploy targets: ${succeeded_hosts[*]}"
          else
            echo "Successful deploy targets: none"
          fi
          if [ "${#failed_hosts[@]}" -gt 0 ]; then
            echo "::error::Deployment failed for target(s): ${failed_hosts[*]}"
            exit 1
          fi

          echo "Deployment completed for all targets."
