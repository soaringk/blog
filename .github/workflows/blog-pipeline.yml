name: Blog Pipeline

permissions:
  contents: read

on:
  push:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  build:
    name: Code standards & build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔎 Lint code"
        run: npm run lint

      - name: "📝 Checking code format"
        run: npm run format:check

      - name: "🚀 Build the project"
        run: npm run build

      - name: "📦 Upload build artifact"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: blog-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy blog
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📦 Download build artifact"
        uses: actions/download-artifact@v7
        with:
          name: blog-dist
          path: dist

      - name: "🔐 Configure SSH"
        env:
          SSH_TARGETS: ${{ secrets.SSH_HOSTS || secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          while IFS= read -r host; do
            [ -n "$host" ] || continue
            ssh-keyscan -p "${SSH_PORT:-22}" "$host" >> "$HOME/.ssh/known_hosts"
          done <<EOF
          $SSH_TARGETS
          EOF

      - name: "📤 Sync dist/ to server"
        env:
          SSH_TARGETS: ${{ secrets.SSH_HOSTS || secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          while IFS= read -r host; do
            [ -n "$host" ] || continue
            ssh -p "${SSH_PORT:-22}" "$SSH_USER@$host" "mkdir -p /var/www/blog"
            rsync -az --delete -e "ssh -p ${SSH_PORT:-22}" dist/ "$SSH_USER@$host:/var/www/blog/"
          done <<EOF
          $SSH_TARGETS
          EOF
